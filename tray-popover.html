<!DOCTYPE html>
<html lang="en" class="tray-popover-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
</head>
<body class="tray-popover-body">
  <div class="tray-pomo-wrap">
    <div class="tray-pomo-header">
      <div class="tray-pomo-modes" id="trayPomoModes">
        <button type="button" class="tray-pomo-mode active" data-mode="focus" data-i18n="pomo-focus-btn">Focus</button>
        <button type="button" class="tray-pomo-mode" data-mode="short" data-i18n="pomo-short-btn-tray">Short</button>
        <button type="button" class="tray-pomo-mode" data-mode="long" data-i18n="pomo-long-btn-tray">Long</button>
      </div>
      <button type="button" class="tray-pomo-close" id="trayPomoClose" aria-label="Close" title="Close">
        <span class="material-symbols-outlined" aria-hidden="true">close</span>
      </button>
    </div>
    <div class="tray-pomo-time" id="trayPomoTime">25:00</div>
    <div class="tray-pomo-task" id="trayPomoTask">No task selected</div>
    <div class="tray-pomo-controls">
      <button type="button" class="tray-pomo-btn" id="trayPomoToggle">Start</button>
      <button type="button" class="tray-pomo-btn tray-pomo-btn-ghost" id="trayPomoSkip" title="Skip">
        <span class="material-symbols-outlined">skip_next</span>
      </button>
    </div>
  </div>
  <script type="module" src="/src/tray-popover.ts"></script>
</body>
</html>
