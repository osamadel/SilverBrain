                    Press <kbd class="px-1 py-0.5 rounded bg-surface-2 font-mono text-[10px]">⌘</kbd> + <kbd class="px-1 py-0.5 rounded bg-surface-2 font-mono text-[10px]">Enter</kbd> to process
                </div>

<!-- Micro-interaction Script -->
<script>
        const textarea = document.getElementById('brain-dump-input');
        const extractBtn = document.getElementById('extract-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // Theme Toggle Logic
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            html.classList.toggle('light');
        });

        // Focus on load
        window.addEventListener('DOMContentLoaded', () => {
            textarea.focus();
        });

        // Shortcut listener
        textarea.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                processDump();
            }
        });

        extractBtn.addEventListener('click', () => {
            processDump();
        });

        function processDump() {
            if (!textarea.value.trim()) {
                textarea.classList.add('animate-pulse');
                setTimeout(() => textarea.classList.remove('animate-pulse'), 1000);
                return;
            }

            // Visual feedback
            extractBtn.innerHTML = `
                <span class="material-symbols-outlined animate-spin" style="font-size: 18px;">sync</span>
                <span class="text-ink-subtle">Processing...</span>
            `;
            extractBtn.classList.add('opacity-80', 'cursor-not-allowed');
            textarea.classList.add('opacity-40');
            
            setTimeout(() => {
                alert("Deep processing complete. Transitioning to 'Sort' view...");
                location.reload();
            }, 1800);
        }

        // Auto-save simulation
        let saveTimeout;
        textarea.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                console.log('Brain dump cached...');
            }, 1000);
        });
    </script>
